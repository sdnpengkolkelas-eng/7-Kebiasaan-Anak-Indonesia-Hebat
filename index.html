<script>
  // Startup diagnostics: surface errors and promise rejections visibly
  (function(){
n    function showDiagnostic(msg, type='error'){
      try{
        const c = document.getElementById('toast-container') || document.body;
        const t = document.createElement('div');
        t.className = 'toast ' + (type==='error' ? 'error' : type==='warn' ? 'info' : 'info');
        t.textContent = msg;
        c.appendChild(t);
        // leave longer so remote devices capture it
        setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 10000);
        console.log('DIAG:', msg);
      }catch(e){ console.log('DIAG FAILED', e); }
    }

    window.addEventListener('error', function(ev){
      showDiagnostic('Startup error: ' + (ev && ev.message ? ev.message : String(ev)), 'error');
    });

    window.addEventListener('unhandledrejection', function(ev){
      const reason = ev && ev.reason ? (ev.reason.message || String(ev.reason)) : 'unknown';
      showDiagnostic('Unhandled promise rejection: ' + reason, 'error');
    });

    // Small delayed check for Firebase availability (helps diagnose file:// issues)
    setTimeout(function(){
      if (!window.rtdb) {
        showDiagnostic('Firebase RTDB not detected. If opened via file://, serve over HTTP (e.g. `python -m http.server`).', 'error');
      } else {
        console.log('DIAG: Firebase RTDB present');
      }
    }, 1500);

    // Expose helper for manual diagnostics from console
    window.showDiagnostic = showDiagnostic;
  })();
</script>
